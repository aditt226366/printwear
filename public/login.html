<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CRM OS Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css?v=20260617-premium" />
  </head>
  <body class="login-shell">
    <main class="login-page premium-login-page">
      <a class="landing-logo login-home" href="/">CRM OS</a>
      <section class="login-panel">
        <div class="login-brand">
          <div>
            <p class="eyebrow">Secure Access</p>
            <h1>Login</h1>
          </div>
        </div>
        <p class="login-subtitle">Sign in to continue to your CRM OS workspace.</p>

        <form id="loginForm" class="login-form">
          <label>
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Username" required />
          </label>
          <label>
            <span>Password</span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Password" required />
          </label>
          <button type="submit" class="primary-button full-width">Login</button>
          <p id="loginError" class="form-error" role="alert"></p>
        </form>
      </section>

      <aside class="login-visual" aria-label="Dashboard preview">
        <div class="landing-orb compact" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <p>Leads, WhatsApp conversations, AI flows, campaigns, handoffs and orders in one premium operating layer.</p>
      </aside>
    </main>

    <script src="/assets/login.js?v=20260616-auth"></script>
  </body>
</html>
