<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Platform Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,650;9..144,800&family=IBM+Plex+Mono:wght@500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css?v=20260616-command" />
  </head>
  <body class="login-shell">
    <main class="login-page">
      <section class="login-panel">
        <div class="login-brand">
          <span class="brand-mark">CRM</span>
          <div>
            <p class="eyebrow">Platform Access</p>
            <h1>Welcome back</h1>
          </div>
        </div>
        <p class="login-subtitle">Sign in to manage WhatsApp leads, orders, and human takeover.</p>

        <form id="loginForm" class="login-form">
          <label>
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Username" required />
          </label>
          <label>
            <span>Password</span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Password" required />
          </label>
          <button type="submit" class="primary-button full-width">Sign in</button>
          <p id="loginError" class="form-error" role="alert"></p>
        </form>
      </section>

      <aside class="login-visual" aria-label="Dashboard preview">
        <div class="signal-strip">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="preview-board">
          <div class="preview-row strong"></div>
          <div class="preview-row"></div>
          <div class="preview-row short"></div>
          <div class="preview-meter">
            <span style="width: 74%"></span>
          </div>
        </div>
        <p>AI-qualified WhatsApp leads, sales conversations, and follow-up signals in one premium workspace.</p>
      </aside>
    </main>

    <script src="/assets/login.js?v=20260616-auth"></script>
  </body>
</html>
